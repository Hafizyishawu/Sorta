name: adversarial-review

# Gate 3 of the defense-in-depth review setup: an independent adversarial review
# of every PR. CI runners cannot reach a local model, so this gate uses the
# Claude engine via ANTHROPIC_API_KEY (Anthropic commercial terms do not train on
# inputs). Blocks the PR on HIGH+ findings and posts the findings as a comment.
#
# Required repo secret: ANTHROPIC_API_KEY
# Third-party actions are pinned to commit SHAs (tags are mutable).

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Adversarial review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Graceful degradation: block ONLY on a real finding (exit 1). A reviewer
          # that cannot run (exit 2 — e.g. no API credit) warns but does not wall
          # off the PR. exit 0 = clean.
          set +e
          bash scripts/adversarial-review.sh \
            --engine claude --threshold high \
            --base "origin/${{ github.base_ref }}" 2>&1 | tee review.out
          rc=${PIPESTATUS[0]}
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -eq 2 ]; then
            echo "::warning::Adversarial reviewer unavailable (exit 2) — PR not blocked, but not reviewed."
          fi
          [ "$rc" -eq 1 ] && exit 1 || exit 0

      - name: Comment findings on PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rc="${{ steps.review.outputs.rc }}"
          {
            if [ "$rc" = "2" ]; then
              echo "### ⚠️ Adversarial review — reviewer unavailable"
              echo
              echo "The reviewer could not run (e.g. no API credit). **Not blocking**, but this PR was not reviewed."
            else
              echo "### Adversarial review (Gate 3)"
            fi
            echo
            echo '```'
            cat review.out 2>/dev/null || echo "(no review output)"
            echo '```'
          } > body.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file body.md || true
